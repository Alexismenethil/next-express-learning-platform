services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog_learning
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: learning-platform-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://platform:platform@postgres:5432/catalog_learning?schema=public
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: learning-platform-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_APP_NAME: Product Catalog Learning Platform
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      INTERNAL_API_URL: http://backend:4000/api
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
